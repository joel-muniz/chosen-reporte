<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistencia — The Chosen</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:-apple-system,'Segoe UI',Roboto,sans-serif; background:#0D1B3E; color:#EAF0FF; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:28px 18px 40px; }
  .logo { width:110px; margin-bottom:12px; }
  h1 { font-size:24px; font-weight:800; }
  .fecha { color:#F5A623; font-size:15px; letter-spacing:2px; text-transform:uppercase; margin:8px 0 22px; font-weight:600; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%; max-width:440px; }
  .chip { background:#162444; border:1px solid #1B3A8C; border-radius:14px; padding:15px 10px; font-size:15px; font-weight:600; text-align:center; cursor:pointer; transition:.15s; }
  .chip.sel { background:#F5A623; color:#0D1B3E; border-color:#F5A623; }
  .invitado { width:100%; max-width:440px; margin-top:12px; }
  .invitado input { width:100%; background:#162444; border:1px solid #1B3A8C; border-radius:14px; color:#EAF0FF; padding:14px; font-size:15px; }
  .invitado input::placeholder { color:#5A6A94; }
  button.enviar { margin-top:20px; width:100%; max-width:440px; background:#F5A623; color:#0D1B3E; border:none; border-radius:16px; padding:17px; font-size:18px; font-weight:800; cursor:pointer; }
  button.enviar:disabled { opacity:.4; }
  .ok { display:none; flex-direction:column; align-items:center; margin-top:60px; text-align:center; }
  .ok .check { font-size:70px; }
  .ok h2 { margin-top:14px; font-size:24px; }
  .ok p { color:#9FB0D8; margin-top:8px; }
</style>

  <h1>Registro de Asistencia</h1>
  <div class="fecha" id="fecha"></div>

  <div id="formulario" style="display:flex; flex-direction:column; align-items:center; width:100%;">
    <div class="grid" id="grid"></div>
    <div class="invitado"><input id="inv" placeholder="¿Invitado? Escribe tu nombre aquí"></div>
    <button class="enviar" id="btn" disabled onclick="enviar()">Registrar mi asistencia</button>
  </div>

  <div class="ok" id="ok">
    <div class="check">✅</div>
    <h2 id="okNombre"></h2>
    <p>Asistencia registrada. ¡Bienvenido a la reunión!</p>
    <p style="margin-top:20px; font-size:14px;">🔥 VAMO ARRIBA CHOSEN 🔥</p>
  </div>

<script>
const ROSTER = ['Joel E. Muñiz','Michelle M. Saez','Christian Quintana','Carlos Rodríguez','Gilberto Talbot','Manuel González','Gerardo Torres','Diana Pellot','Edgardo Vargas','Lilivette Camacho','Lynmarie Justiniano','Sebastián Rodríguez','Víctor M. Jaffett','Jonathan Santiago'];
const hoy = new Date();
document.getElementById('fecha').textContent = hoy.toLocaleDateString('es-PR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

let sel = null;
const grid = document.getElementById('grid');
ROSTER.forEach(n => {
  const c = document.createElement('div');
  c.className = 'chip'; c.textContent = n;
  c.onclick = () => {
    document.querySelectorAll('.chip').forEach(x => x.classList.remove('sel'));
    c.classList.add('sel'); sel = n;
    document.getElementById('inv').value = '';
    document.getElementById('btn').disabled = false;
  };
  grid.appendChild(c);
});
document.getElementById('inv').addEventListener('input', e => {
  if (e.target.value.trim()) {
    document.querySelectorAll('.chip').forEach(x => x.classList.remove('sel'));
    sel = null;
    document.getElementById('btn').disabled = false;
  } else if (!sel) document.getElementById('btn').disabled = true;
});

async function enviar() {
  const nombre = sel || ('Invitado: ' + document.getElementById('inv').value.trim());
  if (!nombre) return;
  document.getElementById('btn').disabled = true;
  document.getElementById('btn').textContent = 'Registrando...';
  try {
    await fetch('https://joel-chosen.oph.st/webhook/chosen-asistencia', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ nombre, fecha: hoy.toISOString().slice(0,10), reunion:'Reunión The Chosen — ' + hoy.toISOString().slice(0,10) })
    });
  } catch(e) {}
  document.getElementById('formulario').style.display = 'none';
  document.getElementById('okNombre').textContent = nombre;
  document.getElementById('ok').style.display = 'flex';
}
</script>
</body>
</html>
